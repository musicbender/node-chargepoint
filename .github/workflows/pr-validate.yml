name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  validate-labels:
    name: Version Label
    runs-on: ubuntu-latest
    steps:
      - name: Check for exactly one version label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const versionLabels = ['bump:patch', 'bump:minor', 'bump:major', 'skip-release'];
            const found = versionLabels.filter(l => labels.includes(l));
            if (found.length === 0) {
              core.setFailed('Add exactly one label: bump:patch, bump:minor, bump:major, or skip-release');
            } else if (found.length > 1) {
              core.setFailed(`Remove extra labels — found: ${found.join(', ')}`);
            }
