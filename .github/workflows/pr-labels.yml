name: PR Labels

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-labels-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-labels:
    name: Version Label
    runs-on: ubuntu-latest
    steps:
      - name: Check for exactly one version label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const versionLabels = ['bump:patch', 'bump:minor', 'bump:major', 'skip-release'];
            const found = versionLabels.filter(l => labels.includes(l));
            if (found.length === 0) {
              core.setFailed('Add exactly one label: bump:patch, bump:minor, bump:major, or skip-release');
            } else if (found.length > 1) {
              core.setFailed(`Remove extra labels — found: ${found.join(', ')}`);
            }
